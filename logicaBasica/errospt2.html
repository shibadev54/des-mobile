<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro</title>
<style>
body{
    font-family: Arial, Helvetica, sans-serif;
}
form{
    width: 300px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}
input{
    padding: 5px;
}
p{
    color: red;
    margin: 0;
    font-size: 14px;
}
#errosGerais{
    color: red;
    margin-bottom: 15px;
}
</style>
</head>
<body>
<h2>Cadastro</h2>
<ul id="errosGerais"></ul>
<form id="formulario">
    <div>
        <input type="text" id="nome" placeholder="Nome">
        <p id="erroNome"></p>
    </div>
    <div>
        <input type="text" id="cpf" placeholder="CPF">
        <p id="erroCpf"></p>
    </div>
    <div>
        <input type="date" id="dataNascimento">
        <p id="erroData"></p>
    </div>
    <div>
        <input type="password" id="senha" placeholder="Senha">
        <p id="erroSenha"></p>
    </div>
    <div>
        <input type="password" id="confirmarSenha" placeholder="Confirmar senha">
        <p id="erroConfirmarSenha"></p>
    </div>
    <button type="submit">Cadastrar</button>
</form>
<script>
let formulario = document.getElementById("formulario");
formulario.addEventListener("submit", function(event){
    event.preventDefault();
    document.getElementById("errosGerais").innerHTML = "";
    document.getElementById("erroNome").innerHTML = "";
    document.getElementById("erroCpf").innerHTML = "";
    document.getElementById("erroData").innerHTML = "";
    document.getElementById("erroSenha").innerHTML = "";
    document.getElementById("erroConfirmarSenha").innerHTML = "";
    let nome = document.getElementById("nome").value;
    let cpf = document.getElementById("cpf").value;
    let dataNascimento = document.getElementById("dataNascimento").value;
    let senha = document.getElementById("senha").value;
    let confirmarSenha = document.getElementById("confirmarSenha").value;
    let erros = [];
    try{
        if(nome == ""){
            erros.push({
                campo: "erroNome",
                mensagem: "Nome obrigatório"
            });
        }
        if(cpf == ""){
            erros.push({
                campo: "erroCpf",
                mensagem: "CPF obrigatório"
            });
        }
        else if(cpf.length != 11){
            erros.push({
                campo: "erroCpf",
                mensagem: "CPF deve ter 11 dígitos"
            });
        }
        else if(isNaN(cpf)){
            erros.push({
                campo: "erroCpf",
                mensagem: "CPF deve conter apenas números"
            });
        }
        if(dataNascimento == ""){
            erros.push({
                campo: "erroData",
                mensagem: "Data obrigatória"
            });
        }
        else{
            let hoje = new Date();
            let dataDigitada = new Date(dataNascimento);
            if(dataDigitada > hoje){
                erros.push({
                    campo: "erroData",
                    mensagem: "Data não pode ser futura"
                });
            }

        }
        if(senha == ""){
            erros.push({
                campo: "erroSenha",
                mensagem: "Senha obrigatória"
            });
        }
        else if(senha.length < 6){
            erros.push({
                campo: "erroSenha",
                mensagem: "Senha deve ter no mínimo 6 caracteres"
            });
        }
        if(confirmarSenha == ""){
            erros.push({
                campo: "erroConfirmarSenha",
                mensagem: "Confirme a senha"
            });
        }
        else if(confirmarSenha != senha){
            erros.push({
                campo: "erroConfirmarSenha",
                mensagem: "As senhas são diferentes"
            });
        }
        if(erros.length > 0){
            throw erros;
        }
        alert("Cadastro realizado com sucesso!");
    }
    catch(listaErros){
        let ul = document.getElementById("errosGerais");
        listaErros.forEach(function(erro){
            ul.innerHTML += `<li>${erro.mensagem}</li>`;
            document.getElementById(erro.campo).innerHTML = erro.mensagem;
        });
    }
});
</script>
</body>
</html>
