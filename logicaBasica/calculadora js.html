<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   <input id="n1" type="number" placeholder="Número 1">
<input id="n2" type="number" placeholder="Número 2">

<br><br>

<button onclick="calcular('+')">+</button>
<button onclick="calcular('-')">-</button>
<button onclick="calcular('*')">*</button>
<button onclick="calcular('/')">/</button>

<h2 id="resultado">Resultado: </h2>
    <script>
  function calcular(operacao) {
    let num1 = Number(document.getElementById("n1").value);
    let num2 = Number(document.getElementById("n2").value);

    const operacoes = {
        "+": (a, b) => a + b,
        "-": (a, b) => a - b,
        "*": (a, b) => a * b,
        "/": (a, b) => b !== 0 ? a / b : "Erro: divisão por zero"
    };

    let resultado = operacoes[operacao](num1, num2);

    document.getElementById("resultado").innerText = "Resultado: " + resultado;
}

    </script>
</body>
</html>
